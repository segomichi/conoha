services:
  db:
    image: postgres:16-alpine
    container_name: saygo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      saygo_net:
        aliases:
          - postgres

  bot:
    build:
      context: ./saygo_bot
      dockerfile: Dockerfile
    container_name: saygo-bot
    restart: unless-stopped
    env_file:
      - ./saygo_bot/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - saygo_net
    
  web:
    build:
      context: ./saygo_web
      dockerfile: Dockerfile
    container_name: saygo-web
    restart: unless-stopped
    env_file:
      - ./saygo_web/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ./data/static:/saygo_web/static
      - ./data/media:/saygo_web/media

    networks:
      - saygo_net

  nginx:
    image: nginx:1.27-alpine
    container_name: saygo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/static:/var/www/static:ro
      - ./data/media:/var/www/media:ro
      - ./data/certbot_www:/var/www/certbot:ro
      - ./data/certbot/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_started
    networks:
      - saygo_net

  certbot:
    image: certbot/certbot
    container_name: saygo-certbot
    restart: unless-stopped
    volumes:
      - ./data/certbot_www:/var/www/certbot
      - ./data/certbot/letsencrypt:/etc/letsencrypt
    networks:
      - saygo_net


volumes:
  postgres_data:

networks:
  saygo_net:
    name: shared-saygo-net
